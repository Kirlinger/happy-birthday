<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Happy Birthday 🎂</title>
  <style>
    /* =============================================
       RESET & BASE
    ============================================= */
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0a0a1a;
      color: #fff;
      font-family: 'Courier New', Courier, monospace;
      min-height: 100vh;
      overflow-x: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    /* =============================================
       BACKGROUND — CYBERPUNK GRID + GRADIENT
    ============================================= */
    .bg {
      position: fixed;
      inset: 0;
      z-index: 0;
      background:
        linear-gradient(180deg, #0a0a1a 0%, #0d0d2b 50%, #0a0a1a 100%);
    }

    /* Horizontal scan-line overlay */
    .bg::after {
      content: '';
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0, 255, 255, 0.03) 2px,
        rgba(0, 255, 255, 0.03) 4px
      );
      pointer-events: none;
    }

    /* Perspective grid */
    .grid {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 55%;
      z-index: 0;
      background:
        linear-gradient(rgba(0, 255, 255, 0.15) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0, 255, 255, 0.15) 1px, transparent 1px);
      background-size: 60px 60px;
      transform: perspective(600px) rotateX(60deg);
      transform-origin: bottom center;
      opacity: 0.35;
    }

    /* =============================================
       CANVAS LAYERS (particles, fireworks, confetti)
    ============================================= */
    canvas {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 1;
    }

    /* =============================================
       MAIN CONTENT
    ============================================= */
    .content {
      position: relative;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
      padding: 40px 20px;
      text-align: center;
    }

    /* =============================================
       NEON SUBTITLE — "IT'S YOUR DAY"
    ============================================= */
    .subtitle {
      font-size: clamp(0.75rem, 2.5vw, 1rem);
      letter-spacing: 0.5em;
      text-transform: uppercase;
      color: #ff00ff;
      text-shadow:
        0 0 6px #ff00ff,
        0 0 20px #ff00ff,
        0 0 40px #ff00ff;
      animation: flicker 4s infinite;
    }

    /* =============================================
       TYPING HEADLINE — "HAPPY BIRTHDAY TO ME"
    ============================================= */
    .headline {
      font-size: clamp(2rem, 8vw, 5.5rem);
      font-weight: 900;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      line-height: 1.1;
      /* Neon cyan glow */
      color: #00f0ff;
      text-shadow:
        0 0 10px #00f0ff,
        0 0 30px #00f0ff,
        0 0 60px #00f0ff,
        0 0 100px #00aaff;
      min-height: 1.2em;
    }

    /* blinking cursor after typed text */
    .cursor {
      display: inline-block;
      width: 3px;
      background: #00f0ff;
      margin-left: 4px;
      vertical-align: middle;
      height: 0.9em;
      box-shadow: 0 0 8px #00f0ff;
      animation: blink 0.75s step-end infinite;
    }

    /* =============================================
       NEON DIVIDER
    ============================================= */
    .divider {
      width: clamp(200px, 60vw, 500px);
      height: 2px;
      background: linear-gradient(90deg, transparent, #ff00ff, #00f0ff, transparent);
      box-shadow: 0 0 10px #ff00ff, 0 0 20px #00f0ff;
      border: none;
      opacity: 0.8;
    }

    /* =============================================
       YEAR BADGE
    ============================================= */
    .year-badge {
      font-size: clamp(1rem, 4vw, 2rem);
      letter-spacing: 0.3em;
      color: #fff;
      text-shadow:
        0 0 8px #ff00ff,
        0 0 25px #ff00ff;
      animation: pulse-glow 2.5s ease-in-out infinite;
    }

    /* =============================================
       MESSAGE BOX
    ============================================= */
    .message {
      max-width: 560px;
      font-size: clamp(0.85rem, 2.5vw, 1.05rem);
      line-height: 1.8;
      color: #c0eeff;
      border: 1px solid rgba(0, 255, 255, 0.25);
      border-radius: 12px;
      padding: 20px 28px;
      background: rgba(0, 255, 255, 0.04);
      box-shadow:
        0 0 20px rgba(0, 255, 255, 0.1),
        inset 0 0 20px rgba(0, 255, 255, 0.04);
      animation: fadeInUp 1.5s ease both;
      animation-delay: 2.5s;
      opacity: 0;
    }

    /* =============================================
       CTA BUTTON
    ============================================= */
    .btn {
      margin-top: 8px;
      padding: 14px 40px;
      font-family: inherit;
      font-size: clamp(0.85rem, 2vw, 1rem);
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #00f0ff;
      background: transparent;
      border: 2px solid #00f0ff;
      border-radius: 6px;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: color 0.3s, box-shadow 0.3s;
      box-shadow:
        0 0 8px #00f0ff,
        inset 0 0 8px rgba(0, 240, 255, 0.1);
      animation: fadeInUp 1.5s ease both;
      animation-delay: 3s;
      opacity: 0;
    }

    .btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: #00f0ff;
      transform: scaleX(0);
      transform-origin: left;
      transition: transform 0.3s ease;
      z-index: -1;
    }

    .btn:hover {
      color: #0a0a1a;
      box-shadow: 0 0 30px #00f0ff, 0 0 60px #00f0ff;
    }

    .btn:hover::before {
      transform: scaleX(1);
    }

    /* =============================================
       BALLOONS
    ============================================= */
    .balloons {
      position: fixed;
      bottom: -180px;
      left: 0;
      width: 100%;
      pointer-events: none;
      z-index: 5;
    }

    .balloon {
      position: absolute;
      bottom: 0;
      width: 60px;
      height: 74px;
      border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      animation: floatUp linear infinite;
    }

    /* thin string */
    .balloon::after {
      content: '';
      position: absolute;
      bottom: -30px;
      left: 50%;
      transform: translateX(-50%);
      width: 1px;
      height: 30px;
      background: rgba(255, 255, 255, 0.4);
    }

    /* =============================================
       KEYFRAME ANIMATIONS
    ============================================= */
    @keyframes floatUp {
      0%   { transform: translateY(0) rotate(-4deg); opacity: 1; }
      50%  { transform: translateY(-40vh) rotate(4deg); opacity: 1; }
      100% { transform: translateY(-95vh) rotate(-3deg); opacity: 0; }
    }

    @keyframes flicker {
      0%, 19%, 21%, 23%, 25%, 54%, 56%, 100% {
        text-shadow:
          0 0 6px #ff00ff,
          0 0 20px #ff00ff,
          0 0 40px #ff00ff;
        opacity: 1;
      }
      20%, 24%, 55% {
        text-shadow: none;
        opacity: 0.4;
      }
    }

    @keyframes pulse-glow {
      0%, 100% {
        text-shadow: 0 0 8px #ff00ff, 0 0 25px #ff00ff;
      }
      50% {
        text-shadow: 0 0 18px #ff00ff, 0 0 50px #ff00ff, 0 0 80px #ff66ff;
      }
    }

    @keyframes blink {
      50% { opacity: 0; }
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(30px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* =============================================
       RESPONSIVE TWEAKS
    ============================================= */
    @media (max-width: 480px) {
      .content { gap: 18px; padding: 30px 16px; }
      .balloon { width: 44px; height: 54px; }
      .message { padding: 16px 18px; }
    }
  </style>
</head>
<body>

  <!-- Background layers -->
  <div class="bg"></div>
  <div class="grid"></div>

  <!-- Canvas for particles, fireworks & confetti -->
  <canvas id="canvas"></canvas>

  <!-- Floating balloons container -->
  <div class="balloons" id="balloons"></div>

  <!-- Main content -->
  <main class="content">
    <p class="subtitle">✦ Luxury Cyberpunk Edition ✦</p>

    <h1 class="headline">
      <span id="typed-text"></span><span class="cursor"></span>
    </h1>

    <hr class="divider" />

    <p class="year-badge">🎂 &nbsp; 2 0 2 6 &nbsp; 🎂</p>

    <p class="message">
      Another year of being absolutely legendary. 🚀<br />
      May your future be as bright as neon lights,<br />
      and your code always compile on the first try. 💾✨
    </p>

    <button class="btn" id="launch-btn" onclick="launchCelebration()">
      🎆 Launch Celebration
    </button>
  </main>

  <script>
    /* =============================================
       SHARED CONSTANTS
    ============================================= */
    const CELEBRATION_DURATION_MS = 13000; // fireworks + balloon lifetime

    /* =============================================
       CANVAS SETUP
    ============================================= */
    const canvas  = document.getElementById('canvas');
    const ctx     = canvas.getContext('2d');

    function resizeCanvas() {
      canvas.width  = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    resizeCanvas();
    window.addEventListener('resize', resizeCanvas);

    /* =============================================
       1. FLOATING PARTICLES
    ============================================= */
    const PARTICLE_COUNT = 80;
    const particles = [];

    const PARTICLE_COLORS = ['#00f0ff', '#ff00ff', '#ff6600', '#ffe600', '#00ff88'];

    class Particle {
      constructor() { this.reset(true); }

      reset(initial = false) {
        this.x     = Math.random() * canvas.width;
        this.y     = initial ? Math.random() * canvas.height : canvas.height + 10;
        this.r     = Math.random() * 2.5 + 0.5;
        this.speed = Math.random() * 0.6 + 0.2;
        this.drift = (Math.random() - 0.5) * 0.4;
        this.color = PARTICLE_COLORS[Math.floor(Math.random() * PARTICLE_COLORS.length)];
        this.alpha = Math.random() * 0.7 + 0.3;
      }

      update() {
        this.y     -= this.speed;
        this.x     += this.drift;
        this.alpha -= 0.0008;
        if (this.y < -10 || this.alpha <= 0) this.reset();
      }

      draw() {
        ctx.save();
        ctx.globalAlpha = this.alpha;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
        ctx.fillStyle = this.color;
        ctx.shadowBlur = 8;
        ctx.shadowColor = this.color;
        ctx.fill();
        ctx.restore();
      }
    }

    for (let i = 0; i < PARTICLE_COUNT; i++) particles.push(new Particle());

    /* =============================================
       2. CONFETTI
    ============================================= */
    const confettiPieces = [];
    let confettiActive   = false;

    const CONFETTI_COLORS = [
      '#00f0ff', '#ff00ff', '#ff6600', '#ffe600',
      '#00ff88', '#ff3366', '#ffffff'
    ];

    class ConfettiPiece {
      constructor() {
        this.x      = Math.random() * canvas.width;
        this.y      = -20;
        this.w      = Math.random() * 10 + 5;
        this.h      = Math.random() * 6 + 3;
        this.color  = CONFETTI_COLORS[Math.floor(Math.random() * CONFETTI_COLORS.length)];
        this.vx     = (Math.random() - 0.5) * 3;
        this.vy     = Math.random() * 3 + 2;
        this.rotate = Math.random() * Math.PI * 2;
        this.spin   = (Math.random() - 0.5) * 0.15;
        this.alpha  = 1;
      }

      update() {
        this.x      += this.vx;
        this.y      += this.vy;
        this.rotate += this.spin;
        this.vy     *= 1.005;          // slight gravity
        if (this.y > canvas.height) this.alpha -= 0.05;
      }

      draw() {
        ctx.save();
        ctx.globalAlpha = Math.max(0, this.alpha);
        ctx.translate(this.x, this.y);
        ctx.rotate(this.rotate);
        ctx.fillStyle = this.color;
        ctx.shadowBlur  = 4;
        ctx.shadowColor = this.color;
        ctx.fillRect(-this.w / 2, -this.h / 2, this.w, this.h);
        ctx.restore();
      }

      isDead() { return this.alpha <= 0; }
    }

    function spawnConfetti(burst = 60) {
      for (let i = 0; i < burst; i++) confettiPieces.push(new ConfettiPiece());
    }

    /* =============================================
       3. FIREWORKS
    ============================================= */
    const fireworks   = [];
    const sparks      = [];
    let fireworksActive = false;

    const FW_COLORS = ['#00f0ff', '#ff00ff', '#ff6600', '#ffe600', '#00ff88', '#ffffff'];

    class Firework {
      constructor() {
        this.x    = Math.random() * canvas.width;
        this.y    = canvas.height;
        this.tx   = Math.random() * canvas.width;
        this.ty   = canvas.height * (0.1 + Math.random() * 0.45);
        this.color= FW_COLORS[Math.floor(Math.random() * FW_COLORS.length)];
        const dx  = this.tx - this.x;
        const dy  = this.ty - this.y;
        const dist= Math.sqrt(dx * dx + dy * dy);
        this.vx   = (dx / dist) * 14;
        this.vy   = (dy / dist) * 14;
        this.trail = [];
        this.done  = false;
      }

      update() {
        this.trail.push({ x: this.x, y: this.y });
        if (this.trail.length > 8) this.trail.shift();
        this.x += this.vx;
        this.y += this.vy;
        // explode near target
        if (Math.abs(this.x - this.tx) < 14 && Math.abs(this.y - this.ty) < 14) {
          this.explode();
          this.done = true;
        }
      }

      explode() {
        const count = 80 + Math.floor(Math.random() * 40);
        for (let i = 0; i < count; i++) {
          const angle = (Math.PI * 2 / count) * i + Math.random() * 0.3;
          const speed = Math.random() * 5 + 1;
          sparks.push({
            x: this.x, y: this.y,
            vx: Math.cos(angle) * speed,
            vy: Math.sin(angle) * speed,
            alpha: 1,
            color: this.color,
            r: Math.random() * 2.5 + 1
          });
        }
      }

      draw() {
        this.trail.forEach((pt, i) => {
          ctx.save();
          ctx.globalAlpha = (i / this.trail.length) * 0.6;
          ctx.beginPath();
          ctx.arc(pt.x, pt.y, 2, 0, Math.PI * 2);
          ctx.fillStyle = this.color;
          ctx.shadowBlur  = 10;
          ctx.shadowColor = this.color;
          ctx.fill();
          ctx.restore();
        });
      }
    }

    function updateSparks() {
      for (let i = sparks.length - 1; i >= 0; i--) {
        const s = sparks[i];
        s.x     += s.vx;
        s.y     += s.vy;
        s.vy    += 0.08;   // gravity
        s.vx    *= 0.98;
        s.alpha -= 0.018;

        if (s.alpha <= 0) { sparks.splice(i, 1); continue; }

        ctx.save();
        ctx.globalAlpha = s.alpha;
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
        ctx.fillStyle   = s.color;
        ctx.shadowBlur  = 12;
        ctx.shadowColor = s.color;
        ctx.fill();
        ctx.restore();
      }
    }

    let fireworkInterval = null;
    function startFireworks() {
      fireworksActive = true;
      fireworkInterval = setInterval(() => {
        fireworks.push(new Firework());
      }, 350);
      // auto-stop after 12 s
      setTimeout(() => {
        clearInterval(fireworkInterval);
        fireworksActive = false;
      }, 12000);
    }

    /* =============================================
       4. BALLOONS
    ============================================= */
    const BALLOON_COLORS = [
      '#ff00ff', '#00f0ff', '#ff6600', '#ffe600',
      '#00ff88', '#ff3366', '#cc66ff'
    ];

    function createBalloon() {
      const el    = document.createElement('div');
      el.className = 'balloon';
      const color  = BALLOON_COLORS[Math.floor(Math.random() * BALLOON_COLORS.length)];
      el.style.left            = Math.random() * 95 + '%';
      el.style.background      = color;
      el.style.boxShadow       = `0 0 16px ${color}, 0 0 32px ${color}`;
      el.style.animationDuration = (6 + Math.random() * 6) + 's';
      el.style.animationDelay    = (Math.random() * 3) + 's';
      el.style.opacity           = '0.85';
      document.getElementById('balloons').appendChild(el);

      // remove from DOM after animation
      setTimeout(() => el.remove(), CELEBRATION_DURATION_MS);
    }

    function launchBalloons(count = 12) {
      for (let i = 0; i < count; i++) {
        setTimeout(createBalloon, i * 250);
      }
    }

    /* =============================================
       5. MAIN RENDER LOOP
    ============================================= */
    function loop() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      // particles
      particles.forEach(p => { p.update(); p.draw(); });

      // confetti
      for (let i = confettiPieces.length - 1; i >= 0; i--) {
        confettiPieces[i].update();
        confettiPieces[i].draw();
        if (confettiPieces[i].isDead()) confettiPieces.splice(i, 1);
      }

      // fireworks
      for (let i = fireworks.length - 1; i >= 0; i--) {
        fireworks[i].update();
        fireworks[i].draw();
        if (fireworks[i].done) fireworks.splice(i, 1);
      }
      updateSparks();

      requestAnimationFrame(loop);
    }
    loop();

    /* =============================================
       6. TYPING EFFECT
    ============================================= */
    const fullText    = 'HAPPY BIRTHDAY TO ME';
    const typedEl     = document.getElementById('typed-text');
    let   charIndex   = 0;
    let   typingDone  = false;

    function typeNextChar() {
      if (charIndex < fullText.length) {
        typedEl.textContent += fullText[charIndex++];
        setTimeout(typeNextChar, 100 + Math.random() * 60);
      } else {
        typingDone = true;
      }
    }

    // slight delay before typing starts
    setTimeout(typeNextChar, 600);

    /* =============================================
       7. LAUNCH CELEBRATION (button click)
    ============================================= */
    function launchCelebration() {
      startFireworks();
      launchBalloons(16);
      // confetti bursts
      spawnConfetti(120);
      setTimeout(() => spawnConfetti(100), 1500);
      setTimeout(() => spawnConfetti(100), 3000);

      // disable button temporarily
      const btn = document.getElementById('launch-btn');
      btn.disabled    = true;
      btn.textContent = '🎆 Celebrating…';
      setTimeout(() => {
        btn.disabled    = false;
        btn.textContent = '🎆 Launch Again';
      }, CELEBRATION_DURATION_MS);
    }

    /* =============================================
       8. AUTO-TRIGGER on page load (after typing)
    ============================================= */
    window.addEventListener('load', () => {
      // first auto-celebration starts after typing (~3 s)
      setTimeout(() => {
        startFireworks();
        launchBalloons(10);
        spawnConfetti(80);
      }, 3200);
    });
  </script>
</body>
</html>
